name: Python CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v2


      - name: Setup Python environment
        run: |
          uv sync --frozen

      - name: Run Ruff linter
        run: uv run ruff check .

      - name: Run pytest
        run: uv run pytest
